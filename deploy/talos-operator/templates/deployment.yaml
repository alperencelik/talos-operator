apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "talos-operator.fullname" . }}
  labels:
    {{- include "talos-operator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "talos-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "talos-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "talos-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- if .Values.featureFlags.enablePxeBootStack }}
            runAsUser: 0
            {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.tracing.enabled }}
          args:
            - --enable-tracing
            - --otlp-endpoint={{ .Values.tracing.otlpEndpoint }}
          {{- end }}
          env:
            - name: TALOS_OPERATOR_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            - name: TALOS_OPERATOR_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: ENABLE_META_KEY
              value: "{{ .Values.featureFlags.enableMetaKey | default "false" }}"
            - name: ENABLE_PXE_BOOT_STACK
              value: "{{ .Values.featureFlags.enablePxeBootStack | default "false" }}"
            {{- if .Values.featureFlags.enablePxeBootStack }}
            - name: MATCHBOX_PORT
              value: "{{ .Values.pxeBootStack.matchbox.port }}"
            - name: TALOS_IMAGES_BASE_URL
              value: "{{ .Values.pxeBootStack.talosBootImagesBaseUrl }}"
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.featureFlags.enablePxeBootStack }}
            {{- with .Values.pxeBootStack.dnsmasq.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.pxeBootStack.matchbox.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
        {{- if .Values.ui.enabled }}
        - name: {{ .Chart.Name }}-ui
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: UI_PORT
              value: "{{ .Values.ui.containerPort | default "8081" }}"
          ports:
            - name: http-ui
              containerPort: {{ .Values.ui.containerPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if .Values.featureFlags.enablePxeBootStack }}
        - name: {{ .Chart.Name }}-dnsmasq
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          image: "{{ .Values.pxeBootStack.dnsmasq.image.repository }}:{{ .Values.pxeBootStack.dnsmasq.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pxeBootStack.dnsmasq.image.pullPolicy }}
          {{- with .Values.pxeBootStack.dnsmasq.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: {{ .Chart.Name }}-matchbox
          image: "{{ .Values.pxeBootStack.matchbox.image.repository }}:{{ .Values.pxeBootStack.matchbox.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pxeBootStack.matchbox.image.pullPolicy }}
          {{- with .Values.pxeBootStack.matchbox.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args: {{ .Values.pxeBootStack.matchbox.args }}
      # hostNetwork is required in order for dnsmasq to work.
      hostNetwork: true
      # shareProcessNamespace is required to restart dnsmasq when the configuration has changed
      shareProcessNamespace: true
      {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
