# Default values for talos-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This will install the CRDs for the Talos Operator.
installCRDs: true

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: "ghcr.io/antux18/talos-operator"
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

env: []

featureFlags:
  enableMetaKey: true # This feature allows you to handle the meta key in the reconciliation logic but requires a custom Talos ISO image with the necessary changes.
  # More information can be found here: https://github.com/siderolabs/talos/discussions/11648#discussioncomment-14253477
  enablePxeBootStack: true # This feature allows you to boot Talos using PXE by installing a DHCP+TFTP and Matchbox servers to send Talos images to clients.

# Prometheus metrics scraping configuration.
metrics:
  serviceMonitor:
    # Create a ServiceMonitor targeting the operator metrics endpoint.
    # Requires the Prometheus Operator CRDs to be installed in the cluster.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Distributed tracing via OpenTelemetry + operatortrace.
tracing:
  enabled: false
  # OTLP HTTP endpoint the operator exports spans to.
  otlpEndpoint: "otel-collector.tracing.svc.cluster.local:4318"

ui:
  enabled: true
  image:
    repository: alperencelik/talos-operator-ui
    pullPolicy: Always
    tag: "latest"
  containerPort: 8082
  service:
    type: ClusterIP
    port: 8082
  resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ui.chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []

pxeBootStack:
  # dnsmasq is used as a DHCP+TFTP server for PXE boot
  dnsmasq:
    image:
      repository: "ghcr.io/antux18/dnsmasq-pxe"
      pullPolicy: Always
      tag: "latest"
    volumeMounts:
      - name: dnsmasq-vol
        mountPath: /etc/dnsmasq.conf
        subPath: dnsmasq.conf
    securityContext:
      capabilities:
        add:
          - NET_ADMIN
  # Matchbox is used as an HTTP server to deliver Talos images and optional kernel command line arguments to each machine depending on their MAC address
  matchbox:
    image:
      repository: "quay.io/poseidon/matchbox"
      pullPolicy: Always
      tag: "latest"
    args: ["-address=0.0.0.0:8080"]
    # Assets persistent volume is used to store Talos boot images delivered by Matchbox
    assetsPvPath: /mnt/talos-operator-matchbox-assets-pv
    volumeMounts:
      - name: matchbox-groups-vol
        mountPath: /var/lib/matchbox/groups
      - name: matchbox-profiles-vol
        mountPath: /var/lib/matchbox/profiles
      - name: matchbox-assets-vol
        mountPath: /var/lib/matchbox/assets

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsUser: 0

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes:
  - name: dnsmasq-vol
    configMap:
      name: dnsmasq-config
      items:
        - key: dnsmasq-config
          path: dnsmasq.conf
  - name: matchbox-groups-vol
    configMap:
      name: matchbox-groups
  - name: matchbox-profiles-vol
    configMap:
      name: matchbox-profiles
  - name: matchbox-assets-vol
    persistentVolumeClaim:
      claimName: matchbox-assets-pvc

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

