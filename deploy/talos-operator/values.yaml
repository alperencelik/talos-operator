# Default values for talos-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of operator replicas. See [the Kubernetes docs](https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/).
replicaCount: 1

# -- Install the Talos Operator CRDs as part of this chart release.
installCRDs: true

image:
  # -- Operator container image repository.
  repository: alperencelik/talos-operator
  # -- Image pull policy.
  pullPolicy: Always
  # -- Image tag. Falls back to the chart `appVersion` when empty.
  tag: "latest"

# -- Extra environment variables to add to the operator container.
env: []

featureFlags:
  # -- Handle the Talos `meta` key in reconciliation. Requires a custom Talos ISO with the necessary changes — see [the upstream discussion](https://github.com/siderolabs/talos/discussions/11648#discussioncomment-14253477).
  enableMetaKey: true
  # -- Install a DHCP+TFTP + Matchbox stack so the operator can PXE-boot Talos machines.
  enablePxeBootStack: false

metrics:
  serviceMonitor:
    # -- Create a `ServiceMonitor` targeting the operator metrics endpoint. Requires the Prometheus Operator CRDs.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Per-scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels to add to the `ServiceMonitor` so it gets picked up by a specific Prometheus selector.
    labels: {}

tracing:
  # -- Enable distributed tracing via OpenTelemetry + `operatortrace`.
  enabled: false
  # -- OTLP HTTP endpoint the operator exports spans to.
  otlpEndpoint: "otel-collector.tracing.svc.cluster.local:4318"

ui:
  # -- Deploy the Talos Operator UI alongside the controller.
  enabled: true
  image:
    # -- UI container image repository.
    repository: alperencelik/talos-operator-ui
    # -- Image pull policy for the UI container.
    pullPolicy: Always
    # -- UI image tag.
    tag: "latest"
  # -- Port the UI container listens on.
  containerPort: 8082
  service:
    # -- UI service type.
    type: ClusterIP
    # -- UI service port.
    port: 8082
  # -- Resource requests/limits for the UI container.
  resources: {}
  ingress:
    # -- Create an `Ingress` for the UI service.
    enabled: false
    # -- `IngressClass` name.
    className: ""
    # -- Annotations to add to the UI `Ingress`.
    annotations: {}
    # -- Hosts/paths to expose the UI at.
    hosts:
      - host: ui.chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    # -- TLS configuration for the UI `Ingress`.
    tls: []

pxeBootStack:
  # -- Base URL used to download Talos boot images.
  talosBootImagesBaseUrl: "https://github.com/siderolabs/talos/releases/download"
  # -- Base URL used to download iPXE binaries.
  ipxeBaseUrl: "https://boot.ipxe.org"
  # -- Volumes added to the operator pod when `featureFlags.enablePxeBootStack` is true. Backs the `dnsmasq.volumeMounts` and `matchbox.volumeMounts` below.
  volumes:
    - name: dnsmasq-vol
      emptyDir:
        sizeLimit: 1Mi
    - name: tftp-vol
      emptyDir:
        sizeLimit: 2Mi
    - name: matchbox-vol
      emptyDir:
        sizeLimit: 10Gi
  dnsmasq:
    # -- `dnsmasq` image (DHCP+TFTP server used for PXE boot).
    image:
      repository: dockurr/dnsmasq
      pullPolicy: Always
      tag: "latest"
    # -- `dnsmasq` container volume mounts.
    volumeMounts:
      - name: dnsmasq-vol
        mountPath: /etc/dnsmasq.d
      - name: tftp-vol
        mountPath: /var/lib/tftp
  matchbox:
    # -- Matchbox image (HTTP server delivering Talos images per MAC).
    image:
      repository: "quay.io/poseidon/matchbox"
      pullPolicy: Always
      tag: "latest"
    # -- Matchbox listening port.
    port: 8000
    # -- Matchbox process arguments.
    args: ["-address=0.0.0.0:8000"]
    # -- Matchbox container volume mounts.
    volumeMounts:
      - name: matchbox-vol
        mountPath: /var/lib/matchbox

# -- `imagePullSecrets` to attach to the operator pod for pulling from private registries.
imagePullSecrets: []
# -- Override the chart name.
nameOverride: ""
# -- Override the full release name (chart name + release name).
fullnameOverride: ""

serviceAccount:
  # -- Create a `ServiceAccount` for the operator.
  create: true
  # -- Auto-mount the `ServiceAccount`'s API credentials.
  automount: true
  # -- Annotations to add to the `ServiceAccount`.
  annotations: {}
  # -- Name of the `ServiceAccount` to use. When empty and `create` is true, a name is generated from the fullname template.
  name: ""

# -- Annotations to add to the operator pod.
podAnnotations: {}
# -- Labels to add to the operator pod.
podLabels: {}

# -- Pod-level security context.
podSecurityContext: {}
  # fsGroup: 2000

# -- Container-level security context.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Operator metrics service type.
  type: ClusterIP
  # -- Operator metrics service port.
  port: 8080

ingress:
  # -- Create an `Ingress` for the operator metrics service.
  enabled: false
  # -- `IngressClass` name.
  className: ""
  # -- Annotations to add to the `Ingress`.
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Hosts/paths to expose.
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  # -- TLS configuration.
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Resource requests/limits for the operator container. Leaving this empty (`{}`) defers the choice to the cluster admin.
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  # -- Enable a `HorizontalPodAutoscaler` for the operator deployment.
  enabled: false
  # -- Minimum replicas.
  minReplicas: 1
  # -- Maximum replicas.
  maxReplicas: 100
  # -- Target average CPU utilization across pods.
  targetCPUUtilizationPercentage: 80
  # -- Target average memory utilization across pods.
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes to attach to the operator pod. The PXE stack's own volumes live under `pxeBootStack.volumes` and are added automatically when `featureFlags.enablePxeBootStack` is true.
volumes: []
# - name: foo
#   emptyDir: {}

# -- Additional `volumeMounts` for the operator container.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- Node selectors for scheduling the operator pod.
nodeSelector: {}

# -- Tolerations for scheduling the operator pod.
tolerations: []

# -- Affinity rules for scheduling the operator pod.
affinity: {}

# -- Arbitrary additional manifests to ship alongside the chart (useful for `ExternalSecret`, `IngressRoute`, etc.).
extraObjects: []
