                                For example, if the object reference is to a container within a pod, this would take on a value like:
                                "spec.containers{name}" (where "name" refers to the name of the container that triggered
                                the event) or if no container name is specified "spec.containers[2]" (container with
                                index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                referencing a part of an object.
                              type: string
                            kind:
                              description: |-
                                Kind of the referent.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                              type: string
                            name:
                              description: |-
                                Name of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            namespace:
                              description: |-
                                Namespace of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                              type: string
                            resourceVersion:
                              description: |-
                                Specific resourceVersion to which this reference is made, if any.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                              type: string
                            uid:
                              description: |-
                                UID of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                              type: string
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                      x-kubernetes-validations:
                      - message: address and machineRef are mutually exclusive
                        rule: has(self.address) != has(self.machineRef)
                    type: array
                    x-kubernetes-list-type: atomic
                type: object
              mode:
                description: mode specifies the deployment mode for the worker nodes
                  (container, metal, or cloud).
                enum:
                - container
                - metal
                - cloud
                type: string
              replicas:
                default: 1
                description: replicas is the number of worker machines to maintain.
                  Only applies when mode is 'container'.
                format: int32
                type: integer
              storageClassName:
                description: storageClassName is the name of the storage class to
                  use for persistent volumes.
                pattern: ^[a-zA-Z0-9][-a-zA-Z0-9_.]*[a-zA-Z0-9]$
                type: string
                x-kubernetes-validations:
                - message: StorageClassName is immutable, you cannot change it after
                    creation
                  rule: self == oldSelf
              version:
                default: v1.12.1
                description: version of Talos to use for the worker nodes -- e.g "v1.12.1"
                pattern: ^v\d+\.\d+\.\d+(-\w+)?$
                type: string
            required:
            - kubeVersion
            - mode
            - version
            type: object
            x-kubernetes-validations:
            - message: Mode is immutable
              rule: '!has(oldSelf.mode) || self.mode == oldSelf.mode'
            - message: MetalSpec is required when mode 'metal'
              rule: self.mode!='metal' || has(self.metalSpec)
            - message: replicas must be at least 1 when mode is 'container'
              rule: self.mode != 'container' || self.replicas >= 1
